version: '3.8'

services:
  web:
    build: .
    ports:
      - "8000:80"
    depends_on:
      - db
      - redis

  db:
    image: postgres:14
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: routeiq_db
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:6

volumes:
  db_data:
